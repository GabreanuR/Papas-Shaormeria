name: "Deploy Godot to GitHub Pages"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    container:
      image: barichello/godot-ci:4.3   # <- pune exact versiunea din project.godot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.3.stable \
             ~/.local/share/godot/export_templates/4.3.stable

      - name: Create Web Build Directory
        run: mkdir -v -p build/web

      - name: Export Web
        env:
          DISPLAY: ""
          GODOT_DISABLE_CRASH_HANDLER: "1"
        run: |
          godot --headless --verbose --export-release "Web" build/web/index.html || true
          # Verifică dacă fișierele au fost generate
          ls -la build/web/

      - name: Add SharedArrayBuffer fix
        run: |
          cp web/coi-serviceworker.js build/web/coi-serviceworker.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' build/web/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4